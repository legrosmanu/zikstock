name: Continuous Deployment

on:
  workflow_dispatch:

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: ${{ secrets.GCP_REGION }}
  GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
  GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
  GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}

jobs:
  deploy:
    name: Deploy to GCP
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for Workload Identity Federation

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate with Google Cloud (Workload Identity Federation)
        if: env.GCP_WORKLOAD_IDENTITY_PROVIDER != ''
        id: auth-wif
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Authenticate with Google Cloud (Service Account Key)
        if: env.GCP_WORKLOAD_IDENTITY_PROVIDER == '' && env.GCP_SA_KEY != ''
        id: auth-key
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ env.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Ensure Artifact Registry repository exists
        run: |
          gcloud artifacts repositories describe zikstock-repo \
            --location=${{ env.GCP_REGION }} \
            --project=${{ env.GCP_PROJECT_ID }} || \
          gcloud artifacts repositories create zikstock-repo \
            --repository-format=docker \
            --location=${{ env.GCP_REGION }} \
            --project=${{ env.GCP_PROJECT_ID }} \
            --description="Zikstock Docker Images"

      - name: Docker Auth
        run: |
          gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/zikstock-repo/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy Backend to Cloud Run
        run: |
          gcloud run deploy zikstock-backend \
            --image ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/zikstock-repo/backend:latest \
            --platform managed \
            --region ${{ env.GCP_REGION }} \
            --allow-unauthenticated \
            --set-env-vars GCLOUD_PROJECT=${{ env.GCP_PROJECT_ID }},GOOGLE_CLIENT_ID=${{ env.GOOGLE_CLIENT_ID }} \
            --project=${{ env.GCP_PROJECT_ID }}

      - name: Retrieve Backend URL
        id: backend-info
        run: |
          BACKEND_URL=$(gcloud run services describe zikstock-backend \
            --region ${{ env.GCP_REGION }} \
            --project=${{ env.GCP_PROJECT_ID }} \
            --format 'value(status.url)')
          echo "url=$BACKEND_URL" >> $GITHUB_OUTPUT
          echo "Retrieved Backend URL: $BACKEND_URL"

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/zikstock-repo/frontend:latest
          build-args: |
            VITE_API_URL=${{ steps.backend-info.outputs.url }}
            VITE_GOOGLE_CLIENT_ID=${{ env.GOOGLE_CLIENT_ID }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy Frontend to Cloud Run
        run: |
          gcloud run deploy zikstock-frontend \
            --image ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/zikstock-repo/frontend:latest \
            --platform managed \
            --region ${{ env.GCP_REGION }} \
            --allow-unauthenticated \
            --project=${{ env.GCP_PROJECT_ID }}

      - name: Retrieve Frontend URL
        id: frontend-info
        run: |
          FRONTEND_URL=$(gcloud run services describe zikstock-frontend \
            --region ${{ env.GCP_REGION }} \
            --project=${{ env.GCP_PROJECT_ID }} \
            --format 'value(status.url)')
          echo "url=$FRONTEND_URL" >> $GITHUB_OUTPUT
          echo "Retrieved Frontend URL: $FRONTEND_URL"

      - name: Update Backend CORS with Frontend URL
        run: |
          gcloud run services update zikstock-backend \
            --region ${{ env.GCP_REGION }} \
            --project=${{ env.GCP_PROJECT_ID }} \
            --update-env-vars FRONTEND_URL=${{ steps.frontend-info.outputs.url }}
